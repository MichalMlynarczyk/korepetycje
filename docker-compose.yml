services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: korepetycje
      POSTGRES_USER: korepetycje
      POSTGRES_PASSWORD: korepetycje_dev_password
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korepetycje -d korepetycje"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py sync_oauth_apps &&
        python manage.py shell -c \"from django.contrib.auth import get_user_model; from django.contrib.auth.models import Group; User=get_user_model(); group,_=Group.objects.get_or_create(name='teacher'); teachers=[('kuba@admin.com','Kuba','admin123'),('norber@admin.com','Norbert','norbert')]; [ (lambda user,email,first_name,password: (setattr(user,'email',email), setattr(user,'first_name',first_name), user.set_password(password), user.save(), user.groups.add(group)))(* (lambda email,first_name,password: (User.objects.get_or_create(username=email, defaults={'email':email,'first_name':first_name})[0], email, first_name, password))(*teacher)) for teacher in teachers ]\" &&
        python manage.py runserver 0.0.0.0:8000
      "
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-docker-change-me
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,45.93.139.211,nastomatma.pl,www.nastomatma.pl
      FRONTEND_URL: https://nastomatma.pl
      WAGTAILADMIN_BASE_URL: https://nastomatma.pl
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      FACEBOOK_OAUTH_CLIENT_ID: ${FACEBOOK_OAUTH_CLIENT_ID:-}
      FACEBOOK_OAUTH_CLIENT_SECRET: ${FACEBOOK_OAUTH_CLIENT_SECRET:-}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-support.nastomatma@gmail.com}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-support.nastomatma@gmail.com}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-support.nastomatma@gmail.com}
      POSTGRES_DB: korepetycje
      POSTGRES_USER: korepetycje
      POSTGRES_PASSWORD: korepetycje_dev_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://45.93.139.211,http://45.93.139.211:5173,https://nastomatma.pl,https://www.nastomatma.pl
      CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://45.93.139.211,http://45.93.139.211:5173,https://nastomatma.pl,https://www.nastomatma.pl
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  backend_media:
